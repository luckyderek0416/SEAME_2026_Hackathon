# ============================================================
# D-Racer 튜닝 파라미터 (영구 저장) — 트랙에서 찾은 좋은 값을 여기 적어두면
# 재시작해도 안 사라지고, --params-file 로 그대로 불러올 수 있다.
#
# 불러오기:
#   ros2 run decision decision_node --ros-args --params-file config/race_params.yaml
#   ros2 run perception lane_node   --ros-args --params-file config/race_params.yaml
#
# 현재 값 덤프(저장):
#   ros2 param dump /decision_node > /tmp/d.yaml   # 그 안의 값을 이 파일에 복사
#
# ⚠️ 주석(#)은 값 옆이 아니라 줄에만. 값은 실제 타입 유지(정수/실수/문자열/불리언).
# ============================================================

decision_node:
  ros__parameters:
    # --- 주행 모드 ---
    course: "in"              # in(회전교차로) / out(S자+갈림길)
    race_dir: "left"          # 배정 트랙 방향: left(반시계) / right(시계)
    skip_missions: false      # true=라인추종만 테스트

    # --- 조향(PID) ---  ★가장 자주 튜닝★
    kp: 0.6                   # 비례: 못 따라가면 ↑, 출렁이면 ↓
    ki: 0.0
    kd: 0.15                  # 미분: 출렁임 잡기
    steer_center: 0.0         # 조향 트림(=vehicle_config STEER_TRIM 값)
    steer_scale: 1.0          # 반대로 꺾이면 -1.0

    # --- 속도(ESC 데드밴드 이상으로!) ---  ★모터 도는 최소값 이상★
    drive_throttle: 0.3       # 기본 주행 속도
    slow_throttle: 0.2        # 최저 속도(커브/회전) — 데드밴드 넘게
    curve_slow: 0.5           # 커브 감속 강도

    # --- 회전교차로 (실측값으로) ---
    circle_steer_bias: 0.15
    target_loops: 1
    min_loop_time_s: 3.0      # 한 바퀴 최소 시간(그 전 탈출 금지)
    max_loop_time_s: 20.0
    nominal_loop_time_s: 8.0  # 실측 한 바퀴 시간
    yaw_lap_threshold: 6.0    # 한 바퀴치 조향적분 로그값
    lap_votes_needed: 2
    enter_curvature: 0.45
    enter_sustain_s: 0.6
    yellow_enter_ratio: 0.06

    # --- 신호등/장애물 ---
    conf_threshold: 0.5
    green_frames: 3
    red_frames: 3
    marker_area_trigger: 0.02

lane_node:
  ros__parameters:
    # --- 색 검출 (hsv_sampler.py로 실측) ---  ★조명 바뀌면 조정★
    mask_mode: "hsv"
    white_hsv_lo: [0, 0, 180]
    white_hsv_hi: [179, 60, 255]
    yellow_hsv_lo: [18, 80, 80]
    yellow_hsv_hi: [38, 255, 255]

    # --- 라인추종 강건성 ---
    roi_top_ratio: 0.55       # 화면 아래 몇 %만 볼지
    num_bands: 4              # 룩어헤드 밴드 수
    morph_kernel: 3           # 노이즈 제거
    smooth_alpha: 0.5         # 낮을수록 부드러움(흔들림↓)

    # --- 회전교차로 분기점(점선) ---
    race_dir: "left"          # junction_side 자동 결정 (decision과 동일하게)
    junction_dash_transitions: 3
